services:
  api:
    build: .
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; r = urllib.request.urlopen('http://localhost:8000/health'); assert json.loads(r.read())['status'] == 'ok'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
